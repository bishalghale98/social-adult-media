version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: privateconnect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/privateconnect?schema=public
      JWT_ACCESS_SECRET: change-this-access-secret-in-production
      JWT_REFRESH_SECRET: change-this-refresh-secret-in-production
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: production
      PORT: 5000
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5000/api/v1
      NEXT_PUBLIC_SOCKET_URL: http://localhost:5000

volumes:
  pgdata:
